spring:
  application:
    name: koog-spring-ai-cs-demo
  ai:
    openai:
      # API key is read from the OPENAI_API_KEY environment variable.
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-nano
          temperature: 1
      embedding:
        options:
          model: text-embedding-3-small
    model:
      chat: openai
      embedding: openai

koog:
  spring:
    ai:
      chat-memory:
        enabled: true
