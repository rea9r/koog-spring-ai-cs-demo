spring:
  application:
    name: koog-spring-ai-cs-demo
  datasource:
    # docker-compose.yml の pgvector コンテナを前提
    url: jdbc:postgresql://localhost:5432/csdemo
    username: csdemo
    password: csdemo
  ai:
    openai:
      # API key is read from the OPENAI_API_KEY environment variable.
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-nano
          temperature: 1
          # Step 5-A16 (A12): streaming response に usage 情報を含める。
          # default では OpenAI API は streaming 時 usage を省略する仕様
          # (`stream_options: {"include_usage": true}` の指定が必要)。Spring AI が
          # `stream-usage: true` で `OpenAiChatOptions.setStreamUsage(true)` 経由で
          # この option を有効化、最後の chunk に usage が含まれて Koog の
          # `StreamFrame.End.metaInfo` まで伝播する。
          stream-usage: true
      embedding:
        options:
          model: text-embedding-3-small
    model:
      chat: openai
      embedding: openai

koog:
  spring:
    ai:
      chat-memory:
        enabled: true
      vectorstore:
        enabled: true
  support:
    history-compression:
      # mode: none | whole | from-last-n | chunked
      mode: from-last-n
      keep-last-n: 4
      chunk-size: 4
      threshold: 6
    chat-memory:
      # A6 で発見した「pattern 引きずり」対策。直近 N 件だけ load/store で keep
      window-size: 4
