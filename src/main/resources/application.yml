spring:
  application:
    name: koog-spring-ai-cs-demo
  datasource:
    # docker-compose.yml の pgvector コンテナを前提
    url: jdbc:postgresql://localhost:5432/csdemo
    username: csdemo
    password: csdemo
  ai:
    openai:
      # API key is read from the OPENAI_API_KEY environment variable.
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-5-nano
          temperature: 1
      embedding:
        options:
          model: text-embedding-3-small
    model:
      chat: openai
      embedding: openai

koog:
  spring:
    ai:
      chat-memory:
        enabled: true
      vectorstore:
        enabled: true
  support:
    history-compression:
      # mode: none | whole | from-last-n | chunked
      mode: from-last-n
      keep-last-n: 4
      chunk-size: 4
      threshold: 6
