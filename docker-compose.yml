services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: koog-spring-ai-cs-demo-pg
    environment:
      POSTGRES_DB: csdemo
      POSTGRES_USER: csdemo
      POSTGRES_PASSWORD: csdemo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csdemo -d csdemo"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  postgres_data:
